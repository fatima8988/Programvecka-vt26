<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Tools — Flashcards & Quiz</title>
  <link rel="stylesheet" href="flashcards.css" />
</head>
<body>
  <div class="app">
    <div class="mobile-overlay" id="mobileOverlay"></div>
    <header class="topbar">
      <div class="brand">
        <div class="logo">
          <span class="dot dot-pink"></span>
          <span class="dot dot-blue"></span>
        </div>
        <div class="brand-text">
          <div class="name">Study Tools</div>
          <div class="sub">Flashcards • Quiz • Question Builder</div>
        </div>
      </div>

      <div class="right-actions">
        <input id="globalSearch" class="search" type="text" placeholder="Sök i frågor..." />
        <button class="btn btn-ghost" id="exportBtn" title="Exportera till JSON">Export</button>
        <label class="btn btn-ghost file-btn" title="Importera JSON">
          Import
          <input id="importFile" type="file" accept="application/json" hidden />
        </label>
      </div>
    </header>

    <main class="main">
      <section class="tabs card">
        <button class="tab active" data-view="builderView">Question Builder</button>
        <button class="tab" data-view="quizView">Quiz</button>
        <button class="tab" data-view="flashView">Flashcards</button>
      </section>

      <!-- BUILDER -->
      <section id="builderView" class="card content">
        <div class="section-head">
          <h2>Lägg in provfrågor</h2>
          <div class="meta" id="builderMeta">—</div>
        </div>

        <div class="grid2">
          <div>
            <label class="label">Fråga</label>
            <textarea id="qInput" class="textarea" rows="4" placeholder="Ex: Vad är oxidation?"></textarea>
          </div>
          <div>
            <label class="label">Svar</label>
            <textarea id="aInput" class="textarea" rows="4" placeholder="Ex: Oxidation är när..."></textarea>
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="addQA">Add question</button>
          <button class="btn btn-ghost" id="clearAllQA">Clear all</button>
        </div>

        <div class="list" id="qaList"></div>
      </section>

      <!-- QUIZ -->
      <section id="quizView" class="card content" style="display:none;">
        <div class="section-head">
          <h2>Quiz</h2>
          <div class="meta" id="quizMeta">—</div>
        </div>

        <div class="actions">
          <button class="btn btn-ghost" id="startQuiz">Start quiz</button>
          <button class="btn btn-primary" id="submitQuiz">Submit</button>
        </div>

        <div id="quizWrap" class="quizWrap"></div>
        <div id="quizResult" class="result" style="display:none;"></div>
      </section>

      <!-- FLASHCARDS -->
      <section id="flashView" class="card content" style="display:none;">
        <div class="section-head">
          <h2>Flashcards</h2>
          <div class="meta" id="flashMeta">—</div>
        </div>

        <div class="flash-controls">
          <button class="btn btn-ghost" id="prevCard">← Prev</button>
          <button class="btn btn-ghost" id="flipCard">Flip</button>
          <button class="btn btn-ghost" id="nextCard">Next →</button>

          <div class="spacer"></div>

          <button class="btn btn-ghost" id="shuffleCards">Shuffle</button>
          <label class="check">
            <input id="onlyUnlearned" type="checkbox" />
            Only unlearned
          </label>
        </div>

        <div class="flashcard" id="flashCard" tabindex="0">
          <div class="badge" id="cardSide">Question</div>
          <div class="title" id="flashTitle">—</div>
          <div class="body" id="flashBody">Lägg in frågor i Question Builder först 🙂</div>
        </div>

        <div class="flash-actions">
          <button class="btn btn-primary" id="markLearned">Mark learned ✓</button>
          <button class="btn btn-ghost" id="markUnlearned">Mark unlearned</button>
        </div>
      </section>

      <footer class="footer">
        <div class="hint">Tips: I builder kan du trycka <b>Ctrl/⌘ + Enter</b> i svarfältet för att lägga till snabbt.</div>
        <div class="hint">Tips: I flashcards kan du trycka <b>Space</b> för Flip.</div>
      </footer>
    </main>
  </div>

  <script src="flashcards.js"></script>
</body>
</html>
